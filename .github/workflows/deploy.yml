name: Deploy VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Deploy backend
        run: |
          rsync -avz \
          --exclude=node_modules \
          --exclude=.env \
          -e "ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no" \
          backend/ \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/apps/pi3-api/

      - name: Restart Node Passenger
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no \
          ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
          "touch /home/${{ secrets.VPS_USER }}/apps/pi3-api/tmp/restart.txt"
