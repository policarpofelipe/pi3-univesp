name: Deploy VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      # FRONTEND
      - name: Build frontend
        working-directory: frontend
        run: |
          npm install
          npm run build
        
      - name: Deploy frontend dist -> public_html/pi3
        run: |
          rsync -az --delete \
            -e "ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no -o BatchMode=yes" \
            frontend/dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/public_html/pi3/

      # BACKEND
      - name: Deploy backend -> apps/pi3-api
        run: |
          rsync -az --delete \
            --exclude=node_modules --exclude=.env --exclude=.git \
            -e "ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no -o BatchMode=yes" \
            backend/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/home/${{ secrets.VPS_USER }}/apps/pi3-api/

      - name: Restart Passenger app
        run: |
          ssh -p ${{ secrets.VPS_PORT }} -o StrictHostKeyChecking=no -o BatchMode=yes \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "mkdir -p /home/${{ secrets.VPS_USER }}/apps/pi3-api/tmp && touch /home/${{ secrets.VPS_USER }}/apps/pi3-api/tmp/restart.txt"
